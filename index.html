<style>
  #splash-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #1a0533 0%, #2d0a5e 40%, #1e0b4a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.4s ease;
  }
  #splash-screen.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: splashIn 0.5s ease;
  }
  @keyframes splashIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .splash-icon {
    width: 100px;
    height: 100px;
    border-radius: 22px;
    box-shadow: 0 8px 40px rgba(139,92,246,0.5);
  }
  .splash-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .splash-tagline {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    letter-spacing: 0.3px;
  }
</style>

<script>
  window.addEventListener('load', function() {

        setTimeout(function() { splash.remove(); }, 400);
      }
    }, 600);
  });
</script>
