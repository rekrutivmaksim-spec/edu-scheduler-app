<div id="splash-screen">
  <div class="splash-orb splash-orb-1"></div>
  <div class="splash-orb splash-orb-2"></div>
  <div class="splash-orb splash-orb-3"></div>
  <div class="splash-content">
    <div class="splash-logo">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="32" fill="url(#sg)"/>
        <text x="32" y="42" text-anchor="middle" font-size="30" font-family="-apple-system,sans-serif" font-weight="800" fill="white">S</text>
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a78bfa"/>
            <stop offset="1" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="splash-name">Studyfay</div>
    <div class="splash-tagline">ИИ-репетитор 24/7</div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<style>
  #splash-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(145deg, #f3effe 0%, #ede9fe 35%, #ddd6fe 70%, #c4b5fd 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.5s ease;
    overflow: hidden;
  }
  #splash-screen.hide {
    opacity: 0;
    pointer-events: none;
  }
  .splash-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    animation: orbFloat 4s ease-in-out infinite;
  }
  .splash-orb-1 {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #a78bfa, #7c3aed);
    top: -60px; right: -40px;
    animation-delay: 0s;
  }
  .splash-orb-2 {
    width: 180px; height: 180px;
    background: radial-gradient(circle, #c4b5fd, #8b5cf6);
    bottom: -40px; left: -50px;
    animation-delay: 1.5s;
  }
  .splash-orb-3 {
    width: 120px; height: 120px;
    background: radial-gradient(circle, #e879f9, #a855f7);
    bottom: 30%; right: 10%;
    animation-delay: 0.8s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }
  .splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: splashIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    z-index: 1;
  }
  @keyframes splashIn {
    from { opacity: 0; transform: scale(0.7) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .splash-logo {
    width: 80px; height: 80px;
    border-radius: 24px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 40px rgba(124,58,237,0.25), 0 2px 8px rgba(124,58,237,0.15);
    margin-bottom: 4px;
  }
  .splash-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 30px;
    font-weight: 800;
    color: #4c1d95;
    letter-spacing: -0.5px;
  }
  .splash-tagline {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    color: #7c3aed;
    font-weight: 500;
    opacity: 0.7;
  }
  .splash-dots {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .splash-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #8b5cf6;
    opacity: 0.4;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
  .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
</style>

<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
<script>
  window.addEventListener('load', function() {
    setTimeout(function() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(function() { splash.remove(); }, 400);
      }
    }, 600);
  });
</script>
